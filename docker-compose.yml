version: '3.9'
services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - CLIENT_URL=http://localhost:5173
      - GEMINI_API_KEY=your_gemini_api_key_here
    volumes:
      - ./server:/app
    command: npm run dev

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    depends_on:
      - server
    volumes:
      - ./client:/app
    command: npm run dev
